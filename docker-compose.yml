services:
  postgres:
    image: postgres:16-alpine
    container_name: migoculto-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-migoculto}
      POSTGRES_USER: ${POSTGRES_USER:-migoculto}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-migoculto}
    ports:
      - "${POSTGRES_PORT:-5434}:5432"
    volumes:
      - migoculto-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-migoculto} -d ${POSTGRES_DB:-migoculto}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  migoculto-postgres-data:
